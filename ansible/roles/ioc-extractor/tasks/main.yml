---
- name: Ensure /opt/ioc-extractor exists
  file:
    path: /opt/ioc-extractor
    state: directory
    owner: cape
    group: cape
    mode: '0755'

- name: Copy docker-compose.yml to VM
  copy:
    src: /extra2/ioc-deploy/docker/docker-compose.yml
    dest: /opt/ioc-extractor/docker-compose.yml
    owner: cape
    group: cape
    mode: '0644'

- name: Copy .env.example to VM
  copy:
    src: /extra2/ioc-deploy/docker/.env.example
    dest: /opt/ioc-extractor/.env.example
    owner: cape
    group: cape
    mode: '0644'

- name: Verify docker-compose.yml was copied
  stat:
    path: /opt/ioc-extractor/docker-compose.yml
  register: compose_stat

- name: Report docker-compose.yml size
  debug:
    msg: "docker-compose.yml: {{ compose_stat.stat.size }} bytes OK"
  when: compose_stat.stat.exists

- name: Check static-analysis image exists
  command: docker image inspect static-analysis:latest
  register: fase1_check
  ignore_errors: true
  changed_when: false

- name: Report static-analysis status
  debug:
    msg: "{{ 'static-analysis:latest OK' if fase1_check.rc == 0 else 'WARNING: static-analysis:latest missing' }}"

- name: Check memory-forensics image exists
  command: docker image inspect memory-forensics:latest
  register: fase3_check
  ignore_errors: true
  changed_when: false

- name: Report memory-forensics status
  debug:
    msg: "{{ 'memory-forensics:latest OK' if fase3_check.rc == 0 else 'WARNING: memory-forensics:latest missing' }}"
